<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stock Research Agent</title>
    <style>
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        max-width: 700px;
        margin: 40px auto;
        padding: 0 20px;
        line-height: 1.6;
        color: #1a1a1a;
        background-color: #fafafa;
    }
    h1 { font-size: 28px; margin-bottom: 8px; }
    h2 { font-size: 18px; margin-top: 28px; margin-bottom: 8px; border-bottom: 1px solid #ddd; padding-bottom: 4px; }
    form { margin-top: 20px; }
    input[type="text"] {
        padding: 10px 12px;
        font-size: 16px;
        border: 1px solid #ccc;
        border-radius: 6px;
        width: 220px;
    }
    button {
        padding: 10px 18px;
        font-size: 16px;
        background-color: #1a1a1a;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        margin-left: 8px;
    }
    button:hover { background-color: #333; }
    pre {
        white-space: pre-wrap;
        background-color: #fff;
        border: 1px solid #eee;
        border-radius: 8px;
        padding: 16px;
    }
    ul { padding-left: 20px; }
    li { margin-bottom: 10px; }
    a { color: #0066cc; }
</style>
</head>
<body>
    <h1>Stock Research Agent</h1>
    <p>Enter a stock ticker to get an AI-powered analysis.</p>

    <form action="/analyze" method="GET">
        <input type="text" name="ticker" placeholder="e.g. AAPL" required>
        <button type="submit">Analyze</button>
    </form>
    <script>
    document.querySelector("form").addEventListener("submit", function() {
        const button = this.querySelector("button");
        button.textContent = "Analyzing...";
        button.disabled = true;
    });
</script>
</body>
</html>
